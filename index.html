<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>Shinra — Contrôle</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon.svg" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Shinra" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0a0a; --surface:#111214; --surface-2:#17181b; --line:#1f2024; --line-2:#2b2c31;
    --text:#f5f5f6; --muted:#8a8a92; --faint:#57575f;
    --acc:#4ade80; --acc-hover:#3dc970; --acc-bg:#0f2417; --acc-line:#1f4d34; --acc-ink:#7ee2a8;
    --ok:#4ade80; --down:#f87171; --idle:#33343a; --gold:#e6c84a;
    --radius:12px;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
    padding:max(16px,env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:980px;margin:0 auto}

  .tabbar{position:sticky;top:env(safe-area-inset-top,0);z-index:8;display:flex;gap:5px;padding:8px 0 10px;background:var(--bg);overflow-x:auto}
  .tabbar::-webkit-scrollbar{height:0}
  .tab{display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--muted);background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:7px 13px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:.15s}
  .tab:hover{color:var(--text);border-color:var(--line-2)}
  .tab.on{color:var(--text);border-color:var(--acc);background:var(--acc-bg)}
  .tab .x{font-size:14px;color:var(--faint);line-height:1}
  .tab .x:hover{color:var(--down)}
  .frames{display:none;height:calc(100vh - 86px);margin:2px -16px 0}
  .frames.show{display:block}
  .frames iframe{width:100%;height:100%;border:0;display:none;background:#fff}
  .frames iframe.on{display:block}
  body.framing #home{display:none}

  header.top{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:4px 0 18px}
  .brand{display:flex;align-items:center;gap:13px;flex:1;min-width:190px}
  .logo{width:42px;height:42px;border-radius:12px;background:var(--acc);display:grid;place-items:center;box-shadow:0 4px 16px -4px var(--acc)}
  .logo svg{width:23px;height:23px}
  h1{font-size:20px;font-weight:600;margin:0;letter-spacing:-.3px}
  .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .top-actions{display:flex;align-items:center;gap:8px}
  button.btn{
    font:inherit;font-size:13px;font-weight:500;color:var(--text);
    background:var(--surface);border:1px solid var(--line);border-radius:9px;
    padding:8px 12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:.15s
  }
  button.btn:hover{background:var(--surface-2);border-color:var(--line-2)}
  button.btn:active{transform:scale(.98)}
  #unlock{border-color:var(--acc-line);color:var(--acc-ink)}
  #unlock:hover{background:var(--acc-bg)}
  .spin{display:inline-block;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .banner,.alert{display:none;align-items:center;gap:10px;border-radius:11px;padding:11px 14px;font-size:13px;margin-bottom:16px}
  .banner{background:var(--acc-bg);border:1px solid var(--acc-line);color:#e6d8ff}
  .banner b{font-weight:600;color:#fff}
  .banner.show,.alert.show{display:flex}
  .alert{background:#2a1414;border:1px solid #5c2626;color:#ffd7d7}
  .alert b{color:#fff;font-weight:600}

  .daily{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:13px 16px;margin:0 0 22px}
  .meteo{font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
  .meteo.ok{color:var(--ok)} .meteo.warn{color:#eab308} .meteo.bad{color:var(--down)}
  .next{color:var(--text);font-size:15px;font-weight:600;margin-bottom:9px;line-height:1.4}
  .next.u{color:var(--acc)}
  .brief-txt{font-size:13.5px;color:var(--muted);margin-top:5px}
  .brief-txt b{color:var(--text);font-weight:600}

  .costs{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin:26px 0 0}
  .costs-head{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .costs-head .tot{margin-left:auto;font-size:13px;color:var(--acc);font-weight:700}
  .costs-add{display:flex;gap:8px;margin-bottom:6px}
  .costs-add input{font:inherit;font-size:14px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none}
  .costs-add input:focus{border-color:var(--acc)}
  #costName{flex:1;min-width:0} #costAmount{width:96px}
  .co-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:.5px solid var(--line);font-size:14px}
  .co-row:last-child{border-bottom:0}
  .co-name{flex:1;word-break:break-word}
  .co-amt{color:var(--text);font-weight:500}
  .co-del{background:none;border:0;color:var(--faint);cursor:pointer;font-size:15px;opacity:.55;padding:0 2px}
  .co-del:hover{color:var(--down);opacity:1}
  .costs-empty{font-size:13px;color:var(--faint);padding:6px 0}

  .rappels{background:var(--acc-bg);border:1px solid var(--acc-line);border-radius:var(--radius);padding:13px 16px;margin:0 0 22px}
  .rap-head{font-size:11px;font-weight:600;color:var(--acc-ink);margin-bottom:9px;text-transform:uppercase;letter-spacing:.06em}
  .rap-row{display:flex;align-items:center;gap:10px;font-size:14px;padding:5px 0}
  .rap-row span{flex:1}
  .rap-add{font:inherit;font-size:12px;font-weight:500;color:var(--acc-ink);background:none;border:1px solid var(--acc-line);border-radius:8px;padding:5px 11px;cursor:pointer;white-space:nowrap;transition:.15s}
  .rap-add:hover{background:var(--surface-2)}
  .rap-add:disabled{opacity:.55;cursor:default}

  .shortcuts{margin:26px 0 0}
  .sc-head{display:flex;align-items:center;gap:12px;margin:0 2px 13px;flex-wrap:wrap}
  .sc-head .t{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .sc-head .rule{flex:1;height:1px;background:var(--line);min-width:20px}
  .sc-head .routine{font:inherit;font-size:12px;font-weight:500;color:var(--acc-ink);background:none;border:1px solid var(--acc-line);border-radius:8px;padding:6px 12px;cursor:pointer;white-space:nowrap;transition:.15s}
  .sc-head .routine:hover{background:var(--acc-bg)}
  .rt-openwrap{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .rt-open{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:10px;background:var(--acc-bg);border:1px solid var(--acc-line);color:var(--acc-ink);text-decoration:none;font-weight:600;font-size:15px}
  .rt-open:active{transform:scale(.98)}
  .rt-open span{opacity:.6}
  .sc-add{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .sc-add input{font:inherit;font-size:14px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none}
  .sc-add input:focus{border-color:var(--acc)}
  #scName{width:150px} #scUrl{flex:1;min-width:140px}
  .sc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
  .sc-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;display:flex;align-items:center;gap:9px}
  .sc-star{background:none;border:0;color:var(--faint);font-size:14px;cursor:pointer;padding:0;line-height:1}
  .sc-star.on{color:var(--gold)}
  .sc-name{flex:1;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sc-open{text-decoration:none;color:var(--acc-ink);font-size:13px;font-weight:500;white-space:nowrap}
  .sc-open:hover{text-decoration:underline}
  .sc-del{background:none;border:0;color:var(--faint);cursor:pointer;font-size:14px;opacity:.5}
  .sc-del:hover{color:var(--down);opacity:1}
  .sc-empty{font-size:13px;color:var(--faint)}

  .journal{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin:26px 0 0}
  .jr-head{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .tkbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:15px 16px;margin-bottom:26px}
  .tkbox-head{font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:2px}
  .tk-who{margin-left:auto;font:inherit;font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none}
  .tk-tabs{display:flex;gap:6px;margin:10px 0 12px;flex-wrap:wrap}
  .tk-tab{font:inherit;font-size:13px;padding:6px 11px;border-radius:999px;border:1px solid var(--line);background:var(--bg);color:var(--muted);cursor:pointer}
  .tk-tab.on{background:var(--acc);border-color:var(--acc);color:#04120a}
  .tk-n{background:rgba(0,0,0,.2);border-radius:999px;padding:0 5px;font-size:11px;margin-left:3px}
  .tk-add{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tk-add input{flex:1;min-width:120px;font:inherit;font-size:14px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none}
  .tk-add .tk-tags-in{flex:0 1 140px}
  .tk-opts-btn{font:inherit;font-size:15px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer;color:var(--muted);flex:0 0 auto}
  .tk-opts-btn.on{border-color:var(--acc);color:var(--acc)}
  .tk-adv{margin-bottom:12px;display:flex;flex-direction:column;gap:8px}
  .tk-adv-row{display:flex;gap:6px;flex-wrap:wrap}
  .tk-adv-row input,.tk-adv-row select{flex:1;min-width:110px;font:inherit;font-size:14px;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none}
  .tk-dest{font:inherit;font-size:13px;padding:0 9px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none}
  #taskAdd{margin:0;padding:9px 15px;font:inherit;font-size:15px;border:0;border-radius:9px;background:var(--acc);color:#04120a;font-weight:700;cursor:pointer}
  .tk-row{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:.5px solid var(--line)}
  .tk-row:last-child{border-bottom:0}
  .tk-ck{background:none;border:0;cursor:pointer;font-size:16px;line-height:1.3;padding:0;transition:transform .12s ease}
  .tk-ck:active{transform:scale(1.35)}
  .tk-body{flex:1;min-width:0}
  .tk-txt{font-size:14px;color:var(--text)}
  .tk-row.done .tk-txt{text-decoration:line-through;color:var(--muted)}
  .tk-tags{margin-top:4px;display:flex;gap:5px;flex-wrap:wrap}
  .tk-tag{font-size:11px;color:var(--acc);background:color-mix(in srgb,var(--acc) 16%,transparent);border-radius:6px;padding:1px 6px}
  .tk-move{font:inherit;font-size:11px;padding:3px 4px;border-radius:7px;border:1px solid var(--line);background:var(--bg);color:var(--muted);outline:none;max-width:104px}
  .tk-del{background:none;border:0;color:var(--faint);cursor:pointer;font-size:13px;padding:2px 4px}
  .tk-empty{color:var(--muted);font-size:13px;padding:6px 0}
  .tasks-hero{border-top:3px solid var(--acc);box-shadow:0 0 0 1px color-mix(in srgb,var(--acc) 26%,transparent),0 10px 34px -14px color-mix(in srgb,var(--acc) 50%,transparent)}
  .tasks-hero .tkbox-head{font-size:16px}
  .restart-btn{margin-left:8px;font:inherit;font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px;border:1px solid var(--line-2);background:var(--bg);color:var(--text);cursor:pointer}
  .restart-btn:hover{border-color:var(--acc);color:var(--acc)}
  .restart-btn:disabled{opacity:.7;cursor:default}
  .tk-row.late{background:color-mix(in srgb,var(--down) 9%,transparent);border-radius:8px;padding-left:8px;padding-right:8px}
  .tk-late{font-size:11px;font-weight:700;color:var(--down);margin-left:8px;white-space:nowrap}
  .tk-lt{background:var(--down);color:#fff;border-radius:999px;padding:0 5px;font-size:10px;margin-left:4px;font-weight:700}
  .tk-latesum{color:var(--down);font-weight:700;font-size:13px;padding:2px 0 10px}
  .tk-rep{font-size:11px;font-weight:600;color:var(--acc);margin-left:8px;white-space:nowrap}
  .ask-row{display:flex;gap:8px;margin-top:4px}
  .ask-row input{flex:1;min-width:0;font:inherit;font-size:14px;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none}
  #askGo{font:inherit;font-size:13px;font-weight:700;color:#04120a;background:var(--acc);border:0;border-radius:9px;padding:0 16px;cursor:pointer;white-space:nowrap}
  #askGo:disabled{opacity:.6;cursor:default}
  .ask-mic{font-size:16px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:0 12px;cursor:pointer;line-height:1}
  .ask-mic.on{background:var(--down);border-color:var(--down);animation:micpulse 1s infinite}
  @keyframes micpulse{0%,100%{opacity:1}50%{opacity:.55}}
  .ask-ex{font-size:12px;color:var(--muted);margin-top:9px}
  .ask-ex a{color:var(--acc);cursor:pointer;text-decoration:none}
  .ask-ans{font-size:14px;color:var(--text);margin-top:12px;line-height:1.6;white-space:pre-wrap}
  .ask-ans.muted{color:var(--muted)}
  .jr-head .c{font-size:11px;color:var(--faint);font-weight:500;margin-left:auto}
  .jr-row{display:flex;gap:11px;padding:9px 0;border-bottom:.5px solid var(--line)}
  .jr-row:last-child{border-bottom:0}
  .jr-src{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;color:var(--acc-ink);background:var(--acc-bg);border:1px solid var(--acc-line);border-radius:6px;padding:3px 7px;height:fit-content;white-space:nowrap}
  .jr-main{flex:1;min-width:0}
  .jr-title{font-size:14px;font-weight:500}
  .jr-body{font-size:13px;color:var(--muted);margin-top:2px;word-break:break-word}
  .jr-time{font-size:11px;color:var(--faint);white-space:nowrap}
  .jr-empty{font-size:13px;color:var(--faint)}

  .todo{background:var(--surface);border:1px solid var(--line);border-top:2px solid var(--acc);border-radius:var(--radius);padding:15px 16px;margin-bottom:26px}
  .todo-head{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:12px}
  .todo-head .c{font-size:11px;color:var(--faint);font-weight:500}
  #todoInput{width:100%;font:inherit;font-size:14px;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--bg);color:var(--text);outline:none;margin-bottom:6px}
  #todoInput:focus{border-color:var(--acc)}
  .ti-row{display:flex;align-items:center;gap:11px;padding:8px 0;border-bottom:.5px solid var(--line)}
  .ti-row:last-child{border-bottom:0}
  .ti-check{width:19px;height:19px;border-radius:6px;border:1.5px solid var(--line-2);flex-shrink:0;cursor:pointer;display:grid;place-items:center;color:transparent;font-size:12px;transition:.15s}
  .ti-check.on{background:var(--acc);border-color:var(--acc);color:#fff}
  .ti-text{flex:1;font-size:14px;cursor:pointer;word-break:break-word}
  .ti-row.on .ti-text{color:var(--faint);text-decoration:line-through}
  .ti-del{background:none;border:0;color:var(--faint);cursor:pointer;font-size:15px;opacity:.55;padding:0 2px}
  .ti-del:hover{color:var(--down);opacity:1}
  .todo-empty{font-size:13px;color:var(--faint);padding:8px 0 2px}

  .worlds{display:inline-flex;gap:2px;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:3px;margin:0 0 18px}
  .worlds button{font:inherit;font-size:13px;font-weight:500;color:var(--muted);background:none;border:0;border-radius:8px;padding:7px 17px;cursor:pointer;transition:.15s}
  .worlds button:hover{color:var(--text)}
  .worlds button.won{color:var(--acc);box-shadow:inset 0 0 0 1.5px var(--acc)}

  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:26px}
  .tile{background:var(--surface);border:1px solid var(--line);border-top:2px solid var(--line);border-radius:var(--radius);padding:14px 16px;transition:.15s}
  .tile:hover{border-color:var(--line-2);transform:translateY(-2px);box-shadow:0 10px 26px -14px rgba(0,0,0,.7)}
  .tile.hero{border-top-color:var(--acc)}
  .tile .lbl{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;font-weight:600}
  .tile .val{font-size:27px;font-weight:700;letter-spacing:-.6px;margin-top:7px}
  .tile.hero .val{color:var(--acc)}
  .tile .val small{font-size:14px;font-weight:600;color:var(--muted);margin-left:2px}

  .section{margin:0 0 24px}
  .sec-head{display:flex;align-items:center;gap:12px;margin:0 2px 13px}
  .sec-head .t{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .sec-head.pin .t{color:var(--gold)}
  .sec-head .rule{flex:1;height:1px;background:var(--line)}

  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:13px}
  .card{background:var(--surface);border:1px solid var(--line);border-top:2px solid var(--line);border-radius:var(--radius);padding:15px 16px 13px;display:flex;flex-direction:column;gap:11px;transition:transform .15s,border-color .15s,box-shadow .15s}
  .card:hover{border-color:var(--line-2);transform:translateY(-3px);box-shadow:0 12px 28px -14px rgba(0,0,0,.75)}
  .card.featured{border-top-color:var(--acc)}
  .card-top{display:flex;align-items:center;gap:10px}
  .ico{width:34px;height:34px;border-radius:10px;background:var(--surface-2);display:grid;place-items:center;font-weight:700;font-size:15px;color:var(--acc-ink);flex-shrink:0;border:1px solid var(--line)}
  .card-name{font-size:14.5px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .star{background:none;border:0;color:var(--faint);font-size:15px;cursor:pointer;padding:0 1px;line-height:1;transition:.15s}
  .star:hover{color:var(--gold)} .star.on{color:var(--gold)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--idle);flex-shrink:0}
  .dot.on{background:var(--ok);box-shadow:0 0 0 3px rgba(74,222,128,.15)} .dot.off{background:var(--down);box-shadow:0 0 0 3px rgba(248,113,113,.15)}
  .metrics{display:flex;gap:20px;flex-wrap:wrap;min-height:40px}
  .metric .m-lbl{font-size:11px;color:var(--faint)}
  .metric .m-val{font-size:20px;font-weight:600;letter-spacing:-.3px;margin-top:2px;display:flex;align-items:baseline;gap:5px}
  .delta{font-size:11.5px;font-weight:600;color:var(--muted)}
  .delta.up{color:var(--ok)} .delta.down{color:var(--down)}
  .spark{display:block;margin-top:7px}
  .note{font-size:12.5px;color:var(--muted)}
  .card-foot{display:flex;align-items:center;gap:8px;margin-top:auto}
  a.open{flex:1;text-align:center;text-decoration:none;font-size:13px;font-weight:500;color:var(--text);
    background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:8px 10px;transition:.15s}
  a.open:hover{background:var(--acc);color:#fff;border-color:var(--acc)}
  a.open.disabled{opacity:.4;pointer-events:none}
  .pill{font-size:11px;font-weight:600;color:var(--muted);background:var(--surface-2);border:1px solid var(--line);border-radius:20px;padding:3px 10px}

  .build .card{opacity:.6}
  .build .card:hover{transform:none}
  .build .metrics{min-height:0}

  .foot{margin-top:26px;padding-top:15px;border-top:1px solid var(--line);display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--faint)}
  .legend{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:8px;height:8px;border-radius:50%;display:inline-block}

  .morning{position:fixed;inset:0;background:var(--bg);display:none;flex-direction:column;padding:26px 20px 40px;z-index:20;overflow-y:auto}
  .morning.show{display:flex}
  .mn-inner{max-width:520px;margin:0 auto;width:100%}
  .mn-top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:6px}
  .mn-hi{font-size:26px;font-weight:800;line-height:1.2}
  .mn-streak{background:color-mix(in srgb,#f59e0b 18%,transparent);color:#f59e0b;border:1px solid color-mix(in srgb,#f59e0b 45%,transparent);border-radius:999px;padding:5px 12px;font-size:14px;font-weight:700;white-space:nowrap}
  .mn-close{background:none;border:0;color:var(--muted);font-size:20px;cursor:pointer;line-height:1}
  .mn-date{color:var(--muted);font-size:14px;margin-bottom:22px;text-transform:capitalize}
  .mn-money{background:linear-gradient(160deg,color-mix(in srgb,var(--acc) 22%,var(--surface)),var(--surface));border:1px solid var(--line-2);border-radius:18px;padding:22px;margin-bottom:14px}
  .mn-money .lbl{font-size:13px;color:var(--muted);font-weight:600}
  .mn-money .big{font-size:52px;font-weight:800;line-height:1.1;margin-top:4px}
  .mn-money .sub{font-size:14px;color:var(--muted);margin-top:8px}
  .mn-next{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px;font-size:15px}
  .mn-next b{color:var(--acc)}
  .mn-tasks{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:20px}
  .mn-tasks h4{margin:0 0 10px;font-size:14px}
  .mn-task{display:flex;gap:9px;padding:7px 0;border-bottom:.5px solid var(--line);font-size:14px}
  .mn-task:last-child{border-bottom:0}
  .mn-go{width:100%;font:inherit;font-size:16px;font-weight:700;color:#04120a;background:var(--acc);border:0;border-radius:12px;padding:15px;cursor:pointer}
  .gate{position:fixed;inset:0;background:rgba(6,6,8,.82);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:20px;z-index:60}
  .gate.show{display:flex}
  .gate .box{background:var(--surface);border:1px solid var(--line-2);border-radius:16px;padding:28px 24px;width:100%;max-width:350px;box-shadow:0 24px 60px -20px rgba(0,0,0,.8);text-align:center}
  .gate .logo{margin:0 auto 14px}
  .gate h2{font-size:17px;font-weight:600;margin:0 0 4px}
  .gate p{font-size:13px;color:var(--muted);margin:0 0 18px}
  .gate input{width:100%;font:inherit;font-size:15px;padding:12px 14px;border-radius:10px;border:1px solid var(--line-2);background:var(--bg);color:var(--text);margin-bottom:10px;text-align:center;outline:none}
  .gate input:focus{border-color:var(--acc)}
  .gate button{width:100%;font:inherit;font-size:14px;font-weight:600;color:#fff;background:var(--acc);border:0;border-radius:10px;padding:12px;cursor:pointer;transition:.15s}
  .gate button:hover{background:var(--acc-hover)}
  .gate .err{color:var(--down);font-size:12.5px;min-height:16px;margin-top:8px}
</style>
</head>
<body>

<div class="gate" id="gate">
  <div class="box">

<div class="morning" id="morning"><div class="mn-inner" id="morningBody"></div></div>

<div class="wrap" id="app">

        <h1>Shinra</h1>
        <div class="sub" id="sub">Chargement…</div>

      <button class="btn" id="push" title="Recevoir les alertes" style="display:none">🔔 Alertes</button>
      <button class="btn" id="install" title="Installer l'app sur ton téléphone" style="display:none">📲 Installer</button>

<script>
/* ============================================================
   CONFIG — pour ajouter/modifier un outil, tout se passe ici.
   ============================================================ */
const HUB_URL = "https://insta-tracker-bot-production.up.railway.app/api/hub"; // cerveau Shinra
const HUB_BASE = HUB_URL.replace(/\/api\/hub$/, "");
const REFRESH_MS = 60000;

const fmtMoney = v => HIDE ? "••• $" : (Math.round(v)).toLocaleString("fr-FR") + " $";
const fmtInt   = v => Math.round(v).toLocaleString("fr-FR");
const fmtBig   = v => {
  v = Number(v)||0;
  if (v >= 1e6) return (v/1e6).toFixed(v>=1e7?0:1).replace(".",",") + " M";
  if (v >= 1e3) return (v/1e3).toFixed(0) + " k";
  return String(Math.round(v));
};

const TOOLS = [
  { id:"lola",             world:"shinra", cat:"Shinra", name:"Bot Lola",          icon:"L", openUrl:"", voyantOnly:true, restart:"bot-discord-shinra" },
  { id:"clipfusion-shinra",world:"shinra", cat:"Shinra", name:"ClipFusion Shinra", icon:"C", openUrl:"https://repurposebot-production-8823.up.railway.app",
    metrics:[{k:"drives7d",l:"Drives 7j",f:fmtInt},{k:"views7d",l:"Vues 7j",f:fmtBig}] },
  { id:"shinra-finance",   world:"shinra", cat:"Shinra", name:"Shinra Finance",    icon:"$", openUrl:"https://fadeflux.github.io/shinra-finance/",
    metrics:[{k:"profitMonth",l:"Profit du mois",f:fmtMoney},{k:"subs",l:"Subs",f:fmtInt}] },
  { id:"sms",              world:"shinra", cat:"Shinra", name:"Numéros SMS", icon:"📱", openUrl:"https://diddysms.com", metrics:[{k:"diddysms",l:"DiddySMS",f:fmtMoney},{k:"getatext",l:"Getatext",f:fmtMoney}] },
];

/* Démo (tant que le cerveau n'est pas activé) — avec tendances + courbes. */
const DEMO = {
  "lola":{status:"online"},
  "clipfusion-shinra":{status:"online",metrics:{drives7d:96,views7d:1800000},series:{views7d:[210000,240000,260000,230000,280000,300000,280000]}},
  "shinra-finance":{status:"online",metrics:{profitMonth:3080,subs:412}},
  "sms":{status:"online",metrics:{diddysms:37,getatext:17}},
};

/* ---------- état ---------- */
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem("ccs_token") || "";
let CURRENT_USER = localStorage.getItem("ccs_name") || "";
let PINS  = JSON.parse(localStorage.getItem("ccs_pins") || "[]");
let LAST  = DEMO;
let WORLD = "all";
let HIDE  = localStorage.getItem("ccs_hide") === "1";
let IS_LIVE = false;
const ACCENTS = { all:["#4ade80","#3dc970"], shinra:["#4ade80","#3dc970"], noctra:["#4ade80","#3dc970"] };
function applyAccent(){
  const a = ACCENTS[WORLD] || ACCENTS.all;
  document.documentElement.style.setProperty("--acc", a[0]);
  document.documentElement.style.setProperty("--acc-hover", a[1]);
}
function setWorld(w){
  WORLD = w; localStorage.setItem("ccs_world", w);
  [...document.querySelectorAll("#worlds button")].forEach(b=>b.classList.toggle("won", b.getAttribute("data-world")===w));
  applyAccent(); render(LAST);
}

function statusClass(s){ return s==="online"?"on":s==="offline"?"off":""; }
function toolById(id){ return TOOLS.find(t=>t.id===id); }

function sparkSVG(arr){
  if(!arr || arr.length<2) return "";
  const w=68,h=22, max=Math.max(...arr), min=Math.min(...arr), rng=(max-min)||1;
  const pts=arr.map((v,i)=>`${(i/(arr.length-1)*w).toFixed(1)},${(h-((v-min)/rng)*(h-3)-1.5).toFixed(1)}`).join(" ");
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}
function deltaHTML(cur, prev){
  if(prev==null || isNaN(prev)) return "";
  const diff = cur - prev;
  if(diff===0) return `<span class="delta" title="identique à la période précédente">=</span>`;
  const up = diff>0;
  return `<span class="delta ${up?'up':'down'}" title="vs période précédente">${up?'▲':'▼'} ${fmtInt(Math.abs(diff))}</span>`;
}

function cardHTML(t, data){
  const d = data[t.id] || {};
  const st = t.build ? "idle" : (d.status||"unknown");
  const pinned = PINS.indexOf(t.id) !== -1;
  const star = t.build ? "" : `<button class="star ${pinned?'on':''}" data-pin="${t.id}" title="${pinned?'Désépingler':'Épingler'}" aria-label="Épingler">${pinned?'★':'☆'}</button>`;
  const dot  = t.build ? "" : `<span class="dot ${statusClass(st)}"></span>`;
  let body;
  if (t.build){
    body = `<div class="note">Pas encore en ligne</div>`;
  } else if (t.voyantOnly){
    body = `<div class="note">${st==="online"?"En ligne":st==="offline"?"Hors ligne":"—"} · voyant seul</div>`;
  } else {
    const m = t.metrics.map(mt=>{
      const raw = d.metrics ? d.metrics[mt.k] : undefined;
      const val = (raw==null) ? "—" : mt.f(raw);
      const delta = (raw!=null && d.prev) ? deltaHTML(raw, d.prev[mt.k]) : "";
      const spark = (raw!=null && d.series && d.series[mt.k]) ? sparkSVG(d.series[mt.k]) : "";
      return `<div class="metric"><div class="m-lbl">${mt.l}</div><div class="m-val">${val}${delta}</div>${spark}</div>`;
    }).join("");
    body = `<div class="metrics">${m}</div>`;
  }
  const restartBtn = (t.restart && TOKEN) ? `<button class="restart-btn" data-restart="${escapeHtml(t.restart)}" data-restartname="${escapeHtml(t.name)}" title="Redémarrer ce bot">🔄 Redémarrer</button>` : "";
  const foot = t.build
    ? `<div class="card-foot"><span class="pill">à venir</span></div>`
    : `<div class="card-foot"><a class="open ${t.openUrl?"":"disabled"}" href="${t.openUrl||"#"}" ${t.openUrl?`data-openurl="${escapeHtml(t.openUrl)}" data-openid="${t.id}" data-openname="${escapeHtml(t.name)}"`:""} target="_blank" rel="noopener">${t.openUrl?"Ouvrir":"URL à définir"}</a>${restartBtn}</div>`;
  return `<div class="card ${t.featured?"featured":""}">
    <div class="card-top"><div class="ico">${t.icon}</div><div class="card-name">${t.name}</div>${star}${dot}</div>
    ${body}${foot}</div>`;
}

function inWorld(t){ return WORLD==="all" || t.world===WORLD; }
function groups(){
  const out = [];
  const pinnedTools = PINS.map(toolById).filter(t=>t && !t.build && inWorld(t));
  if (pinnedTools.length) out.push({ cat:"★ Épinglés", pin:true, build:false, tools:pinnedTools });
  [...new Set(TOOLS.map(t=>t.cat))].forEach(cat=>{
    const isBuild = cat==="En construction";
    const tools = TOOLS.filter(t=>t.cat===cat && inWorld(t) && (isBuild || PINS.indexOf(t.id)===-1));
    if (tools.length) out.push({ cat, pin:false, build:isBuild, tools });
  });
  return out;
}

let SMS_DATA=null;
async function loadSms(){ if(!TOKEN) return; try{ const r=await fetch(HUB_BASE+"/api/hub/sms",{headers:{"x-hub-token":TOKEN}}); if(r.ok){ const j=await r.json(); SMS_DATA=j.sms||null; if(typeof LAST!=="undefined"&&LAST) render(LAST); } }catch(e){} }
function render(data){
  LAST = data;
  if(typeof SMS_DATA!=="undefined" && SMS_DATA){ const dd=SMS_DATA.diddysms, gt=SMS_DATA.getatext; if((dd&&dd.balance!=null)||(gt&&gt.balance!=null)){ data["sms"]=data["sms"]||{}; data["sms"].status="online"; data["sms"].metrics=Object.assign({},(data["sms"]||{}).metrics,{ diddysms:(dd&&dd.balance!=null)?dd.balance:null, getatext:(gt&&gt.balance!=null)?gt.balance:null }); } }
  $("#sections").innerHTML = groups().map(g=>{
    const cards = g.tools.map(t=>cardHTML(t,data)).join("");
    return `<div class="section ${g.build?"build":""}">
      <div class="sec-head ${g.pin?"pin":""}"><span class="t">${g.cat}</span><span class="rule"></span></div>
      <div class="grid">${cards}</div></div>`;
  }).join("");

  const live = TOOLS.filter(t=>!t.build && inWorld(t));
  const onCount = live.filter(t=>(data[t.id]||{}).status==="online").length;
  const gg = (id,k)=>{ const d=data[id]; return d&&d.metrics?Number(d.metrics[k])||0:0; };
  const stInW = inWorld(toolById("stats-tracker"));
  const tiles = [`<div class="tile hero"><div class="lbl">Outils en ligne</div><div class="val">${onCount}<small>/ ${live.length}</small></div></div>`];
  if(stInW){
    tiles.push(`<div class="tile"><div class="lbl">À payer (quinzaine)</div><div class="val">${fmtMoney(gg("stats-tracker","aPayer"))}</div></div>`);
    tiles.push(`<div class="tile"><div class="lbl">Subs équipe</div><div class="val">${fmtInt(gg("stats-tracker","subsQuinzaine"))}</div></div>`);
  }
  let profit = 0;
  if(inWorld(toolById("shinra-finance"))) profit += gg("shinra-finance","profitMonth");
  if(inWorld(toolById("noctra-finance"))) profit += gg("noctra-finance","profitMonth");
  tiles.push(`<div class="tile"><div class="lbl">Profit du mois</div><div class="val">${fmtMoney(profit)}</div></div>`);
  $("#summary").innerHTML = tiles.join("");

  // alerte hors-ligne
  const off = live.filter(t=>(data[t.id]||{}).status==="offline");
  if (off.length){
    $("#alert").innerHTML = `<b>⚠️ ${off.length} outil${off.length>1?"s":""} hors ligne</b> — ${off.map(t=>t.name).join(", ")}`;
    $("#alert").classList.add("show");
  } else $("#alert").classList.remove("show");

  // résumé du jour
  renderBrief(data, live, onCount, stInW);
}

/* ---------- résumé du jour + météo business ---------- */
function nextAction(data, live){
  if(!IS_LIVE) return {icon:"🔑", text:"Connecte-toi pour activer tes vrais chiffres", urgent:true};
  const off = live.filter(t=>(data[t.id]||{}).status==="offline");
  if(off.length) return {icon:"🔧", text:`Répare ${off[0].name} — hors ligne`, urgent:true};
  const d=new Date(), day=d.getDate();
  if(day===15 || day===lastDayOfMonth(d.getFullYear(),d.getMonth())) return {icon:"💰", text:"C'est jour de paie — paye tes VA", urgent:true};
  const t = TODOS.find(x=>!x.d);
  if(t) return {icon:"📝", text:t.t, urgent:false};
  return {icon:"✅", text:"Tout est à jour — rien d'urgent", urgent:false};
}
function renderBrief(data, live, onCount, stInW){
  STREAK = computeStreak();
  const off = live.length - onCount;
  const meteo = off===0 ? "ok" : (off>=2 ? "bad" : "warn");
  const st = data["stats-tracker"] || {};
  const subsDelta = (stInW && st.prev && st.metrics && st.metrics.subsQuinzaine!=null) ? st.metrics.subsQuinzaine - (st.prev.subsQuinzaine||0) : null;
  const today = (stInW && st.series && st.series.subsQuinzaine && st.series.subsQuinzaine.length) ? st.series.subsQuinzaine[st.series.subsQuinzaine.length-1] : null;
  let s = [];
  if (today!=null) s.push(`<b>${fmtInt(today)}</b> sub${today>1?"s":""} aujourd'hui`);
  if (subsDelta!=null && subsDelta!==0) s.push(subsDelta>0 ? `quinzaine <b>en hausse</b> (+${fmtInt(subsDelta)})` : `quinzaine <b>en baisse</b> (${fmtInt(subsDelta)})`);
  if (stInW && st.metrics && st.metrics.aPayer!=null) s.push(`<b>${fmtMoney(st.metrics.aPayer)}</b> à payer`);
  s.push(off===0 ? `tous tes outils tournent` : `<b>⚠️ ${off} outil${off>1?"s":""} hors ligne</b>`);
  const nTodo = TODOS.filter(t=>!t.d).length;
  if (nTodo>0) s.push(`<b>${nTodo}</b> tâche${nTodo>1?"s":""} à faire`);
  if (STREAK>0) s.push(`🔥 <b>${STREAK}</b> j`);
  const h = new Date().getHours();
  const greet = h<6?"Bonne nuit":h<12?"Bonjour":h<18?"Bon après-midi":"Bonsoir";
  const mIcon = meteo==="ok"?"🟢":meteo==="warn"?"🟡":"🔴";
  const mLbl = meteo==="ok"?"Tout roule":meteo==="warn"?"À surveiller":"Attention";
  const na = nextAction(data, live); LAST_NA = na;
  $("#daily").innerHTML = `<div class="next ${na.urgent?'u':''}">👉 ${na.icon} ${escapeHtml(na.text)}</div><span class="meteo ${meteo}">${mIcon} ${mLbl}</span><div class="brief-txt">${greet} 👋 · ${s.join(" · ")}</div>`;
  if(typeof showMorningIfNew==="function") showMorningIfNew();
}

function demoFallback(msg){

  render(DEMO);

  setBanner(msg);

let LOADING=false, OFFLINE_FAILS=0, OFFLINE_TIMER=null;
async function load(){
  if(LOADING) return;
  LOADING=true;
  const rico = $("#rico"); rico.classList.add("spin");
  try{
    if(!HUB_URL){ demoFallback(`<b>Mode démo</b> — chiffres d'exemple. Le « cerveau » n'est pas encore branché.`); return; }
    if(!TOKEN){ openGate(); return; }   // pas de session -> écran de connexion direct
    let j=null, lastErr=null, authFail=false;
    for(let attempt=0; attempt<3; attempt++){
      try{
        const r = await fetch(HUB_URL,{headers:{"x-hub-token":TOKEN},cache:"no-store"});
        if(r.status===401){ authFail=true; throw new Error("HTTP 401"); }
        if(!r.ok) throw new Error("HTTP "+r.status);
        j = await r.json(); break;
      }catch(e){ lastErr=e; if(authFail) break; if(attempt<2) await new Promise(res=>setTimeout(res,1200*(attempt+1))); }
    }
    if(!j){
      if(authFail){ openGate("🔑 Ta session a expiré — reconnecte-toi."); return; }
      throw (lastErr||new Error("offline"));
    }
    OFFLINE_FAILS=0; if(OFFLINE_TIMER){ clearTimeout(OFFLINE_TIMER); OFFLINE_TIMER=null; }
    IS_LIVE = true;
    render(j.tools||{});
    try{ localStorage.setItem("ccs_lastdata", JSON.stringify(j.tools||{})); }catch(_){}
    $("#sub").textContent = "Mis à jour à l'instant";
    $("#footnote").textContent = new Date().toLocaleString("fr-FR");
    setBanner("");
    $("#unlock").style.display = "none";
  }catch(e){
    OFFLINE_FAILS++;
    let cached=null; try{ cached = TOKEN ? JSON.parse(localStorage.getItem("ccs_lastdata")||"null") : null; }catch(_){}
    if(cached){
      IS_LIVE=true; render(cached);
      if(OFFLINE_FAILS>=2){ $("#sub").textContent="Reconnexion…"; setBanner("📶 Reconnexion en cours… tes chiffres restent affichés."); }
      if(!OFFLINE_TIMER) OFFLINE_TIMER=setTimeout(()=>{ OFFLINE_TIMER=null; load(); }, 7000);
    } else {
      demoFallback(`<b>Chiffres d'exemple</b> — reconnecte-toi pour afficher tes vrais chiffres.`);
    }
  }finally{
    LOADING=false;
    rico.classList.remove("spin");
  }
}
window.addEventListener("online", function(){ OFFLINE_FAILS=0; if(!$("#gate").classList.contains("show")) load(); });

  const pad="=".repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,"+").replace(/_/g,"/");

  for(let i=0;i<raw.length;i++) out[i]=raw.charCodeAt(i);
  return out;
}

function saveTasks(){
  tkNorm(); TK_LAST_EDIT=Date.now(); localStorage.setItem("ccs_tasks",JSON.stringify(TASKS));
  if(TOKEN){ clearTimeout(TK_SAVE_T); TK_SAVE_T=setTimeout(()=>{ fetch(HUB_BASE+"/api/hub/tasks",{method:"POST",headers:{"content-type":"application/json","x-hub-token":TOKEN},body:JSON.stringify({tasks:TASKS})}).catch(()=>{}); },500); }
}
function tkSig(x){ return [x.id,x.text,(x.tags||[]).join(","),x.done?1:0,x.prio||"n",x.repeat||"",x.doneTs||0,x.del?1:0,x.upd||0].join("|"); }
function tkBoardSig(b){ return TK_KEYS.map(k=>(b[k]||[]).map(tkSig).join(";")).join("§"); }
function tkMerge(local, server){
  const out={}; let localWins=false;
  TK_KEYS.forEach(k=>{
    const byId={};
    (server[k]||[]).forEach(x=>{ if(x&&x.id) byId[x.id]=x; });
    (local[k]||[]).forEach(x=>{ if(!x||!x.id) return; const sv=byId[x.id]; if(!sv || (Number(x.upd)||0)>(Number(sv.upd)||0)){ byId[x.id]=x; localWins=true; } });
    out[k]=Object.keys(byId).map(id=>byId[id]);
  });
  return {board:out, localWins};
}
async function loadTasks(){
  if(TOKEN){ try{ const r=await fetch(HUB_BASE+"/api/hub/tasks",{headers:{"x-hub-token":TOKEN}}); if(r.ok){ const j=await r.json(); if(j.tasks){ const m=tkMerge(TASKS,j.tasks); TASKS=m.board; tkNorm(); localStorage.setItem("ccs_tasks",JSON.stringify(TASKS)); if(m.localWins) saveTasks(); } } }catch(e){} }
  renderTasks();
}
async function syncTasks(){
  if(!TOKEN) return;
  try{
    const r=await fetch(HUB_BASE+"/api/hub/tasks",{headers:{"x-hub-token":TOKEN}}); if(!r.ok) return;
    const j=await r.json(); if(!j.tasks) return;
    const m=tkMerge(TASKS,j.tasks);
    if(tkBoardSig(m.board)!==tkBoardSig(TASKS)){ TASKS=m.board; tkNorm(); localStorage.setItem("ccs_tasks",JSON.stringify(TASKS)); renderTasks(); }
    if(m.localWins && Date.now()-TK_LAST_EDIT>1500){ fetch(HUB_BASE+"/api/hub/tasks",{method:"POST",headers:{"content-type":"application/json","x-hub-token":TOKEN},body:JSON.stringify({tasks:TASKS})}).catch(()=>{}); }
  }catch(e){}
}
setInterval(syncTasks, 8000);
function addTask(){
  const t=$("#taskText"), g=$("#taskTags"), d=$("#taskDest"), rp=$("#taskRepeat");
  const text=(t.value||"").trim(); if(!text) return;
  const tags=(g.value||"").split(",").map(s=>s.trim()).filter(Boolean).slice(0,8);
  const dest=(d&&d.value)||"moi", repeat=(rp&&rp.value)||"";
  tkNorm(); TASKS[dest].unshift({id:tkId(),text,tags,done:false,ts:Date.now(),repeat,upd:Date.now()});
  t.value=""; g.value=""; if(rp) rp.value=""; saveTasks(); renderTasks();
}
function renderTasks(){
  tkNorm(); if(tkReconcile()) saveTasks();
  const who=$("#taskWho");
  if(who && !who.dataset.filled){ who.innerHTML=`<option value="moi">Je suis : ${escapeHtml(NAMES.moi)}</option><option value="other">Je suis : ${escapeHtml(NAMES.other)}</option>`; who.dataset.filled="1"; who.value=WHO; who.onchange=()=>{ WHO=who.value; localStorage.setItem("ccs_who",WHO); TK_VIEW=WHO; renderTasks(); }; }
  const dest=$("#taskDest");
  if(dest){ dest.innerHTML=TK_KEYS.map(k=>`<option value="${k}">${escapeHtml(tkName(k))}</option>`).join(""); dest.value=TK_VIEW; }
  const OVD=3*24*3600*1000, now=Date.now(), isLate=x=>!x.done && !x.del && x.ts && (now-x.ts>OVD);
  $("#taskTabs").innerHTML=TK_KEYS.map(k=>{ const n=TASKS[k].filter(x=>!x.done && !x.del).length, lt=TASKS[k].filter(isLate).length; return `<button class="tk-tab ${k===TK_VIEW?'on':''}" data-tkview="${k}">${escapeHtml(tkTabLabel(k))}${n?`<span class="tk-n">${n}</span>`:""}${lt?`<span class="tk-lt">⏰${lt}</span>`:""}</button>`; }).join("");
  const items=(TASKS[TK_VIEW]||[]).filter(x=>!x.del);
  const lateCount=items.filter(isLate).length;
  const lateSum=lateCount?`<div class="tk-latesum">⏰ ${lateCount} tâche${lateCount>1?"s":""} en retard (plus de 3 jours)</div>`:"";
  $("#taskList").innerHTML = items.length ? (lateSum+items.map(x=>{
    const tags=(x.tags||[]).map(g=>`<span class="tk-tag">#${escapeHtml(g)}</span>`).join("");
    const opts=TK_KEYS.map(k=>`<option value="${k}" ${k===TK_VIEW?"selected":""}>${escapeHtml(tkName(k))}</option>`).join("");
    const late=isLate(x), days=late?Math.max(1,Math.floor((now-x.ts)/(24*3600*1000))):0;
    return `<div class="tk-row ${x.done?"done":""} ${late?"late":""}"><button class="tk-ck" data-tkdone="${x.id}">${x.done?"✅":"⬜"}</button><div class="tk-body"><span class="tk-txt">${escapeHtml(x.text)}</span>${late?`<span class="tk-late">⏰ ${days}j</span>`:""}${x.repeat?`<span class="tk-rep">🔁 ${REPEAT_LBL[x.repeat]||""}</span>`:""}${tags?`<div class="tk-tags">${tags}</div>`:""}</div><select class="tk-move" data-tkmove="${x.id}" title="Déplacer vers…">${opts}</select><button class="tk-del" data-tkdel="${x.id}">✕</button></div>`;
  }).join("")) : `<div class="tk-empty">Rien ici — ajoute une tâche 👆</div>`;
}
{ const a=$("#taskAdd"); if(a) a.onclick=addTask; }
{ const o=$("#taskAddOpts"), adv=$("#taskAdv");
  const setAdv=(open)=>{ if(adv) adv.style.display=open?"flex":"none"; if(o) o.classList.toggle("on",open); localStorage.setItem("ccs_tkadv",open?"1":"0"); };
  if(o) o.onclick=()=>setAdv(adv && adv.style.display==="none");
  if(localStorage.getItem("ccs_tkadv")==="1") setAdv(true);
}
{ const t=$("#taskText"); if(t) t.addEventListener("keydown",e=>{ if(e.key==="Enter") addTask(); }); }
{ const tabs=$("#taskTabs"); if(tabs) tabs.addEventListener("click",e=>{ const b=e.target.closest("[data-tkview]"); if(b){ TK_VIEW=b.getAttribute("data-tkview"); localStorage.setItem("ccs_tkview",TK_VIEW); const d=$("#taskDest"); if(d) d.value=TK_VIEW; renderTasks(); } }); }
{ const list=$("#taskList"); if(list){
  list.addEventListener("click",e=>{
    const ck=e.target.closest("[data-tkdone]"); if(ck){ const it=TASKS[TK_VIEW].find(x=>x.id===ck.getAttribute("data-tkdone")); if(it){ it.done=!it.done; if(it.done){ if(it.repeat) it.doneTs=Date.now(); tkPop(); } else it.doneTs=0; it.upd=Date.now(); saveTasks(); renderTasks(); } return; }
    const dl=e.target.closest("[data-tkdel]"); if(dl){ const id=dl.getAttribute("data-tkdel"); const it=TASKS[TK_VIEW].find(x=>x.id===id); if(it){ it.del=true; it.upd=Date.now(); saveTasks(); renderTasks(); } return; }
  });
  list.addEventListener("change",e=>{
    const mv=e.target.closest("[data-tkmove]"); if(mv){ const id=mv.getAttribute("data-tkmove"), to=mv.value; if(to!==TK_VIEW){ const it=TASKS[TK_VIEW].find(x=>x.id===id); if(it){ TASKS[to].unshift({id:tkId(),text:it.text,tags:it.tags||[],prio:it.prio||"n",repeat:it.repeat||"",done:!!it.done,doneTs:it.doneTs||0,ts:it.ts||Date.now(),upd:Date.now()}); it.del=true; it.upd=Date.now(); saveTasks(); renderTasks(); } } }
  });
} }

/* ---------- assistant qui agit + dictée + carte du jour ---------- */
async function doAsk(q){
  q=(q||($("#askInput")||{}).value||"").trim(); if(!q) return;
  if(!TOKEN){ openGate("Connecte-toi d'abord pour utiliser l'assistant."); return; }
  $("#askInput").value=q;
  const go=$("#askGo"); if(go){ go.disabled=true; go.textContent="…"; }
  $("#askAns").className="ask-ans muted"; $("#askAns").textContent="L'assistant réfléchit…";
  try{
    const r=await fetch(HUB_BASE+"/api/hub/agent",{method:"POST",headers:{"content-type":"application/json","x-hub-token":TOKEN},body:JSON.stringify({message:q, names:NAMES})});
    if(r.status===401){ $("#askAns").className="ask-ans muted"; $("#askAns").textContent="Reconnecte-toi."; openGate("🔑 Reconnecte-toi (identifiant + mot de passe)."); if(go){go.disabled=false;go.textContent="Envoyer";} return; }
    const j=await r.json();
    $("#askAns").className="ask-ans"; $("#askAns").textContent=j.answer||j.error||"Pas de réponse.";
    if(j.reloadTasks) loadTasks();
  }catch(e){ $("#askAns").className="ask-ans muted"; $("#askAns").textContent="Erreur — réessaie."; }
  finally{ if(go){ go.disabled=false; go.textContent="Envoyer"; } }
}
{ const g=$("#askGo"); if(g) g.onclick=()=>doAsk(); }
{ const i=$("#askInput"); if(i) i.addEventListener("keydown",e=>{ if(e.key==="Enter") doAsk(); }); }
{ const a=$("#ask"); if(a) a.addEventListener("click",e=>{ const q=e.target.closest("[data-q]"); if(q) doAsk(q.getAttribute("data-q")); }); }
(function(){ const SR=window.SpeechRecognition||window.webkitSpeechRecognition; const mic=$("#askMic"); if(!mic) return; if(!SR){ mic.style.display="none"; return; } let rec=null,listening=false; mic.onclick=()=>{ if(listening){ try{rec.stop();}catch(e){} return; } rec=new SR(); rec.lang="fr-FR"; rec.interimResults=false; rec.maxAlternatives=1; rec.onstart=()=>{ listening=true; mic.classList.add("on"); mic.textContent="🔴"; }; rec.onend=()=>{ listening=false; mic.classList.remove("on"); mic.textContent="🎤"; }; rec.onresult=(e)=>{ const t=e.results[0][0].transcript; $("#askInput").value=t; doAsk(t); }; try{ rec.start(); }catch(e){ listening=false; } }; })();
function roundRect(ctx,X,Y,W,H,R){ ctx.beginPath(); ctx.moveTo(X+R,Y); ctx.arcTo(X+W,Y,X+W,Y+H,R); ctx.arcTo(X+W,Y+H,X,Y+H,R); ctx.arcTo(X,Y+H,X,Y,R); ctx.arcTo(X,Y,X+W,Y,R); ctx.closePath(); }
function ggSafe(id,k){ try{ return gg(id,k); }catch(e){ return 0; } }
function makeDayCard(){
  const c=document.createElement("canvas"); c.width=1080; c.height=1350; const x=c.getContext("2d");
  const acc=(getComputedStyle(document.documentElement).getPropertyValue("--acc")||"#4ade80").trim();
  const brand=(document.querySelector("h1")||{}).textContent||"Shinra";
  x.fillStyle="#0a0a0a"; x.fillRect(0,0,1080,1350);
  const g=x.createRadialGradient(540,-120,60,540,320,760); g.addColorStop(0,acc); g.addColorStop(1,"rgba(10,10,10,0)"); x.globalAlpha=.35; x.fillStyle=g; x.fillRect(0,0,1080,760); x.globalAlpha=1;
  x.fillStyle="#fff"; x.font="bold 66px Inter,Arial,sans-serif"; x.fillText(brand,80,148);
  x.fillStyle=acc; x.font="600 33px Inter,Arial,sans-serif"; const dt=new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"}); x.fillText("Résumé du "+dt,80,205);
  const stats=[["Profit du mois",fmtMoney(ggSafe("shinra-finance","profitMonth"))],["Subs",fmtInt(ggSafe("shinra-finance","subs"))],["Drives 7j",fmtInt(ggSafe("clipfusion-shinra","drives7d"))],["Vues 7j",fmtBig(ggSafe("clipfusion-shinra","views7d"))]];
  const sy=290;
  for(let i=0;i<stats.length;i++){ const col=i%2,row=(i/2)|0,bx=80+col*480,by=sy+row*225; x.fillStyle="#141416"; roundRect(x,bx,by,440,195,24); x.fill(); x.fillStyle="#8a8a92"; x.font="600 29px Inter,Arial,sans-serif"; x.fillText(stats[i][0],bx+34,by+56); x.fillStyle="#fff"; x.font="bold 58px Inter,Arial,sans-serif"; x.fillText(String(stats[i][1]),bx+34,by+146); }
  const undone=(typeof TASKS!=="undefined")?(["moi","other","general"].reduce((a,k)=>a+((TASKS[k]||[]).filter(t=>!t.done).length),0)):0;
  x.fillStyle="#57575f"; x.font="500 29px Inter,Arial,sans-serif"; x.fillText("✅ "+undone+" tâche(s) en cours · Centre de contrôle",80,sy+2*225+80);
  return c;
}
async function shareDayCard(){
  const c=makeDayCard();
  c.toBlob(async(blob)=>{ if(!blob) return; try{ const file=new File([blob],"carte-du-jour.png",{type:"image/png"}); if(navigator.canShare&&navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:"Résumé du jour"}); return; } }catch(e){} const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="carte-du-jour.png"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),3000); },"image/png");
}
{ const cb=$("#card"); if(cb) cb.onclick=shareDayCard; }

/* ---------- écran du matin « Bonjour » (Shinra) ---------- */
let LAST_NA=null, STREAK=0, MORNING_SHOWN=false;
function todayStr(){ return new Date().toISOString().slice(0,10); }
function computeStreak(){ const t=todayStr(); let s=null; try{ s=JSON.parse(localStorage.getItem("ccs_streak")||"null"); }catch(e){} s=s||{count:0,last:""}; if(s.last!==t){ const y=new Date(Date.now()-864e5).toISOString().slice(0,10); s.count=(s.last===y)?(s.count+1):1; s.last=t; localStorage.setItem("ccs_streak",JSON.stringify(s)); } return s.count; }
function animateCount(el,to,fmt,dur){ to=Number(to)||0; dur=dur||900; const start=performance.now(); (function step(now){ const p=Math.min(1,(now-start)/dur); const e=1-Math.pow(1-p,3); el.textContent=fmt(Math.round(to*e)); if(p<1) requestAnimationFrame(step); })(performance.now()); setTimeout(()=>{ el.textContent=fmt(to); }, dur+150); }
function renderMorning(){
  const name=(typeof NAMES!=="undefined"&&NAMES[(typeof WHO!=="undefined")?WHO:"moi"])||"toi";
  const streak=computeStreak();
  const h=new Date().getHours(), hi=h<6?"Bonne nuit":h<12?"Bonjour":h<18?"Bon après-midi":"Bonsoir";
  let profit=0; try{ profit=gg("shinra-finance","profitMonth"); }catch(e){}
  const money=v=>(typeof HIDE!=="undefined"&&HIDE)?"•••":Math.round(Number(v)||0).toLocaleString("fr-FR")+" $";
  const tasks=[]; ["moi","general"].forEach(k=>{ ((typeof TASKS!=="undefined"&&TASKS[k])||[]).filter(t=>!t.done).forEach(t=>tasks.push(t)); }); const shown=tasks.slice(0,6);
  const na=LAST_NA;
  $("#morningBody").innerHTML=`
    <div class="mn-top"><div class="mn-hi">${hi} ${escapeHtml(name)} 👋</div><div style="display:flex;gap:10px;align-items:center">${streak>0?`<span class="mn-streak">🔥 ${streak} j</span>`:""}<button class="mn-close" id="mnSpeak" title="Écouter mon résumé">🔊</button><button class="mn-close" id="mnClose">✕</button></div></div>
    <div class="mn-date">${new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"})}</div>
    <div class="mn-money"><div class="lbl">💰 Profit du mois</div><div class="big" id="mnMoney">${money(profit)}</div><div class="sub">agence Shinra</div></div>
    ${na?`<div class="mn-next">👉 ${na.icon||""} <b>${escapeHtml(na.text||"")}</b></div>`:""}
    <div class="mn-tasks"><h4>📋 Ta journée ${shown.length?`(${tasks.length})`:""}</h4>${shown.length?shown.map(t=>`<div class="mn-task">⬜ ${escapeHtml(t.text)}</div>`).join(""):`<div style="color:var(--muted);font-size:14px">Rien pour l'instant 🎉</div>`}</div>
    <button class="mn-go" id="mnGo">Commencer ma journée →</button>`;
  const mv=$("#mnMoney"); if(mv && !(typeof HIDE!=="undefined"&&HIDE)) animateCount(mv, profit||0, v=>v.toLocaleString("fr-FR")+" $");
  const cl=$("#mnClose"), go=$("#mnGo"); if(cl) cl.onclick=closeMorning; if(go) go.onclick=closeMorning;
  const sp=$("#mnSpeak"); if(sp) sp.onclick=speakBriefing;
}
function speakBriefing(){
  try{ if(!window.speechSynthesis) return;
    const name=(typeof NAMES!=="undefined"&&NAMES[(typeof WHO!=="undefined")?WHO:"moi"])||"toi";
    const h=new Date().getHours(), hi=h<12?"Bonjour":h<18?"Bon après-midi":"Bonsoir";
    let profit=0; try{ profit=gg("shinra-finance","profitMonth"); }catch(e){}
    const undone=(typeof TASKS!=="undefined")?["moi","other","general"].reduce((a,k)=>a+((TASKS[k]||[]).filter(t=>!t.done).length),0):0;
    let p=[hi+" "+name+"."];
    if(profit && !(typeof HIDE!=="undefined"&&HIDE)) p.push("Profit du mois : "+Math.round(profit)+" dollars.");
    p.push(undone?(undone+" tâche"+(undone>1?"s":"")+" à faire."):"Aucune tâche en attente.");
    const u=new SpeechSynthesisUtterance(p.join(" ")); u.lang="fr-FR"; window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
  }catch(e){}
}
function showMorning(){ renderMorning(); $("#morning").classList.add("show"); }
function closeMorning(){ $("#morning").classList.remove("show"); localStorage.setItem("ccs_morning",todayStr()); }
function showMorningIfNew(){ if(!TOKEN) return; if(MORNING_SHOWN) return; MORNING_SHOWN=true; if(localStorage.getItem("ccs_morning")!==todayStr()) showMorning(); }
{ const mb=$("#morn"); if(mb) mb.onclick=showMorning; }
